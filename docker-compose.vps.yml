# Docker VPS — ScreenStudio + Ollama in same compose stack
# Usage: docker compose -f docker-compose.vps.yml up -d
# For GPU support: install nvidia-container-toolkit on host first
services:
  screenstudio:
    build: .
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
