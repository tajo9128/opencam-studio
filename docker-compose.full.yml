# Full Stack — BioDockify Studio + Ollama + RTMP Relay for live streaming
# Usage: docker compose -f docker-compose.full.yml up -d
# Stream to YouTube: set stream key in Settings, relay handles RTMP
services:
  BioDockify Studio:
    build: .
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - ollama
      - rtmp-relay

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  rtmp-relay:
    build: ./server
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  ollama_data:
