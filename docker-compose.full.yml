# Full Stack — OpenCam Studio + Ollama
# Usage: docker compose -f docker-compose.full.yml up -d
services:
  opencam-studio:
    build:
      context: .
      dockerfile: server/Dockerfile.allinone
    ports:
      - "3000:80"
    restart: unless-stopped
    volumes:
      - videos:/videos
      - proxies:/proxies
      - projects:/projects
      - output:/output
      - recordings:/recordings
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
  videos:
  proxies:
  projects:
  output:
  recordings:
