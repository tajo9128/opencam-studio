server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Vercel Analytics — return 404 (not available outside Vercel)
    location /_vercel/ {
        return 404;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy Ollama API (avoids CORS issues in browser)
    # Resolved at request-time so nginx starts even if Ollama is down.
    # Set OLLAMA_HOST env var or use docker-compose to connect Ollama.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $ollama_upstream ollama:11434;
    location /api/ollama/ {
        rewrite ^/api/ollama/(.*) /api/$1 break;
        proxy_pass http://$ollama_upstream;
        proxy_set_header Host localhost:11434;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @ollama_offline;
    }

    location @ollama_offline {
        default_type application/json;
        return 503 '{"error":"Ollama is not running. Start Ollama or use docker-compose.full.yml"}';
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=self, microphone=self, geolocation=()" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
