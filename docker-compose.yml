services:
  screenstudio:
    build: .
    ports:
      - "3000:80"
    restart: unless-stopped
    # Ollama connects via host network — user runs Ollama separately
    # Default: http://localhost:11434
    # For VPS with Ollama on same host: use host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
