services:
  BioDockify Studio:
    build: .
    ports:
      - "3000:80"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rtmp-relay

  rtmp-relay:
    build: ./server
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - PORT=8080
